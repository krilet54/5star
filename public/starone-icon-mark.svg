<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background square — remove this rect for transparent version -->
  <rect width="200" height="200" fill="#080808"/>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" stroke="#C9A060" stroke-width="0.75" opacity="0.2"/>

  <!-- 4-pointed star mark -->
  <g transform="translate(100,100)">
    <!-- Main star body -->
    <path d="M0,-58 L13,-13 L58,0 L13,13 L0,58 L-13,13 L-58,0 L-13,-13 Z" fill="#C9A060"/>
    <!-- Inner concave shadow -->
    <path d="M0,-18 L5.5,-5.5 L18,0 L5.5,5.5 L0,18 L-5.5,5.5 L-18,0 L-5.5,-5.5 Z" fill="#080808" opacity="0.35"/>
    <!-- Bright highlight star (smaller, rotated 45°) -->
    <path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#E8C87A" opacity="0.7"/>
    <!-- Centre jewel -->
    <circle cx="0" cy="0" r="4.5" fill="#E8C87A"/>
    <circle cx="0" cy="0" r="2" fill="#FFF8E8"/>
  </g>
</svg>
